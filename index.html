<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>出勤予定カレンダー</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a3a5c">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f0f4f8; --card: #ffffff; --primary: #1a3a5c;
    --accent: #e63946; --paid: #2ecc71; --paid-dark: #27ae60;
    --text: #1d2d44; --muted: #8a9bb0; --border: #dce6f0;
    --today-bg: #e8f0fe; --shadow: 0 2px 12px rgba(26,58,92,0.10);
    --lock-color: #e67e22;
  }
  body { background: var(--bg); font-family: 'Hiragino Sans','Noto Sans JP',sans-serif; color: var(--text); min-height:100vh; padding-bottom:100px; }

  /* HEADER */
  header { background:var(--primary); color:#fff; padding:14px 14px 10px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(0,0,0,0.2); }
  .header-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .header-top h1 { font-size:14px; font-weight:700; letter-spacing:.05em; opacity:.85; }
  .header-actions { display:flex; align-items:center; gap:7px; }
  .lock-btn { display:flex; align-items:center; gap:4px; background:rgba(255,255,255,.15); border:1.5px solid rgba(255,255,255,.3); color:#fff; padding:5px 9px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; transition:background .15s; }
  .lock-btn.locked { background:var(--lock-color); border-color:var(--lock-color); }
  .line-btn { display:flex; align-items:center; gap:4px; background:#06c755; border:none; color:#fff; padding:5px 9px; border-radius:20px; font-size:11px; font-weight:700; cursor:pointer; transition:background .15s; }
  .line-btn:active { background:#05b34d; }
  .header-nav { display:flex; align-items:center; gap:10px; justify-content:center; }
  .nav-btn { background:rgba(255,255,255,.15); border:none; color:#fff; width:34px; height:34px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .nav-btn:active { background:rgba(255,255,255,.3); }
  .month-title { font-size:20px; font-weight:800; min-width:120px; text-align:center; }
  .lock-banner { display:none; background:var(--lock-color); color:#fff; text-align:center; font-size:12px; font-weight:700; padding:5px; }
  .lock-banner.show { display:block; }
  .stats-bar { display:flex; gap:14px; justify-content:center; margin-top:6px; }
  .stat { display:flex; align-items:center; gap:5px; font-size:12px; opacity:.9; }
  .stat-dot { width:10px; height:10px; border-radius:50%; }
  .stat-dot.work { background:var(--accent); }
  .stat-dot.paid { background:var(--paid); }

  /* CALENDAR */
  .calendar-wrap { padding:10px 8px; }
  /* ── capture target ── */
  #cal-capture { background:var(--bg); border-radius:14px; overflow:hidden; }
  .cal-capture-header { background:var(--primary); color:#fff; padding:12px 14px; }
  .cal-capture-header .cap-title { font-size:16px; font-weight:800; }
  .cal-capture-header .cap-sub { font-size:11px; opacity:.75; margin-top:2px; }
  .weekday-row { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; padding:0 2px; }
  .weekday-label { text-align:center; font-size:11px; font-weight:700; padding:4px 0; }
  .weekday-label.sun { color:var(--accent); }
  .weekday-label.sat { color:#4a7ab8; }
  .weekday-label.week { color:var(--muted); }
  .days-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; padding:0 2px 6px; }
  .day-cell { aspect-ratio:1; background:var(--card); border-radius:10px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; position:relative; transition:transform .1s; box-shadow:0 1px 4px rgba(0,0,0,.06); overflow:hidden; user-select:none; }
  .day-cell:active { transform:scale(.93); }
  .day-cell.locked-cell { cursor:default; }
  .day-cell.locked-cell:active { transform:none; }
  .day-cell.other-month { background:#e8edf3; opacity:.5; pointer-events:none; }
  .day-cell.today { background:var(--today-bg); box-shadow:0 0 0 2px #4a7ab8 inset; }
  .day-num { font-size:15px; font-weight:600; line-height:1; z-index:1; position:relative; }
  .day-cell.sun .day-num { color:var(--accent); }
  .day-cell.sat .day-num { color:#4a7ab8; }
  .circle-mark { position:absolute; width:80%; height:80%; border-radius:50%; background:var(--accent); opacity:0; transform:scale(0); transition:opacity .2s,transform .2s; z-index:0; }
  .day-cell.work .circle-mark { opacity:.88; transform:scale(1); }
  .day-cell.work .day-num { color:#fff !important; }
  .day-cell.paid .circle-mark { background:var(--paid); opacity:.92; transform:scale(1); }
  .day-cell.paid .day-num { color:#fff !important; }
  .paid-label { font-size:8px; font-weight:800; color:#fff; z-index:1; position:relative; margin-top:1px; line-height:1; }
  .memo-dot { position:absolute; bottom:3px; right:4px; width:5px; height:5px; border-radius:50%; background:#4a7ab8; z-index:2; }

  /* MEMO PANEL */
  .memo-panel { margin:0 10px 12px; background:var(--card); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; }
  .memo-panel-header { background:var(--primary); color:#fff; padding:10px 14px; font-size:13px; font-weight:700; }
  .memo-area { padding:10px 12px; }
  .memo-date-label { font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:600; }
  .memo-input { width:100%; border:1.5px solid var(--border); border-radius:8px; padding:8px 10px; font-size:14px; font-family:inherit; color:var(--text); resize:none; line-height:1.5; outline:none; background:#fafcff; }
  .memo-input:focus { border-color:#4a7ab8; }
  .memo-save-btn { margin-top:8px; width:100%; padding:9px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:700; cursor:pointer; }

  /* HELP */
  .help-bar { margin:0 10px 10px; background:var(--card); border-radius:12px; padding:10px 14px; box-shadow:var(--shadow); display:flex; gap:12px; flex-wrap:wrap; font-size:11px; color:var(--muted); }
  .help-item { display:flex; align-items:center; gap:5px; }
  .help-dot { width:14px; height:14px; border-radius:50%; flex-shrink:0; }

  /* SCHEDULE LIST */
  .schedule-section { margin:0 10px; }
  .section-title { font-size:13px; font-weight:700; color:var(--primary); margin-bottom:8px; padding-left:4px; }
  .schedule-list { display:flex; flex-direction:column; gap:6px; }
  .schedule-item { background:var(--card); border-radius:10px; padding:9px 12px; display:flex; align-items:center; gap:10px; box-shadow:0 1px 4px rgba(0,0,0,.07); font-size:13px; }
  .schedule-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
  .schedule-dot.work { background:var(--accent); }
  .schedule-dot.paid { background:var(--paid); }
  .schedule-date { font-weight:700; min-width:55px; }
  .schedule-type { color:var(--muted); }
  .schedule-memo { font-size:11px; color:var(--muted); margin-left:auto; max-width:100px; text-align:right; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .empty-schedule { text-align:center; color:var(--muted); font-size:13px; padding:20px; background:var(--card); border-radius:10px; }

  /* LINE MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:200; align-items:flex-end; justify-content:center; }
  .modal-overlay.show { display:flex; }
  .modal-sheet { background:#fff; border-radius:20px 20px 0 0; width:100%; max-width:480px; padding:18px 16px 36px; animation:slideUp .25s ease; max-height:92vh; overflow-y:auto; }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .modal-handle { width:40px; height:4px; background:#ddd; border-radius:2px; margin:0 auto 14px; }
  .modal-title { font-size:16px; font-weight:800; color:var(--primary); margin-bottom:12px; text-align:center; }

  /* Image preview area */
  .img-preview-wrap { position:relative; margin-bottom:14px; }
  .img-preview-label { font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; display:flex; align-items:center; gap:4px; }
  #cal-img-preview { width:100%; border-radius:10px; border:1.5px solid var(--border); display:block; }
  .img-generating { display:flex; align-items:center; justify-content:center; height:120px; background:#f8fafb; border-radius:10px; border:1.5px solid var(--border); font-size:13px; color:var(--muted); gap:8px; }
  .spinner { width:18px; height:18px; border:2px solid #dce6f0; border-top-color:#4a7ab8; border-radius:50%; animation:spin .7s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* Text preview */
  .text-preview-label { font-size:11px; font-weight:700; color:var(--muted); margin-bottom:6px; }
  .line-preview { background:#f8fafb; border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; font-size:12px; line-height:1.7; white-space:pre-wrap; color:var(--text); margin-bottom:14px; max-height:130px; overflow-y:auto; font-family:inherit; }

  /* Steps guide */
  .steps-guide { background:#fffbea; border:1.5px solid #f4d03f; border-radius:10px; padding:10px 12px; margin-bottom:14px; font-size:12px; color:#7d6608; line-height:1.8; }
  .steps-guide strong { color:#5d4e00; }

  /* Buttons */
  .modal-btns { display:flex; gap:8px; flex-wrap:wrap; }
  .btn-save-img { flex:1; min-width:120px; padding:11px; background:var(--primary); color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
  .btn-save-img:active { background:#0f2540; }
  .btn-line { flex:1; min-width:120px; padding:11px; background:#06c755; color:#fff; border:none; border-radius:10px; font-size:13px; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:5px; }
  .btn-line:active { background:#05b34d; }
  .btn-copy { padding:11px 14px; background:#eef2f8; color:var(--primary); border:none; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; }
  .btn-cancel { padding:11px 14px; background:#f0f0f0; color:var(--muted); border:none; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer; }

  /* TOAST */
  .toast { position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px); background:#1a3a5c; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; font-weight:700; box-shadow:0 4px 16px rgba(0,0,0,.25); opacity:0; transition:opacity .3s,transform .3s; z-index:999; pointer-events:none; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>📋 出勤予定カレンダー</h1>
    <div class="header-actions">
      <button class="lock-btn" id="lock-btn"><span id="lock-icon">🔓</span><span id="lock-label">ロック</span></button>
      <button class="line-btn" id="line-share-btn">💬 LINE</button>
    </div>
  </div>
  <div class="header-nav">
    <button class="nav-btn" id="prev-btn">‹</button>
    <div class="month-title" id="month-title"></div>
    <button class="nav-btn" id="next-btn">›</button>
  </div>
  <div class="stats-bar">
    <div class="stat"><div class="stat-dot work"></div><span id="work-count">0</span>日出勤</div>
    <div class="stat"><div class="stat-dot paid"></div><span id="paid-count">0</span>日有給</div>
  </div>
</header>

<div class="lock-banner" id="lock-banner">🔒 この月はロックされています — 編集不可</div>

<!-- ★ capture target wraps the grid only -->
<div class="calendar-wrap">
  <div id="cal-capture">
    <div class="cal-capture-header">
      <div class="cap-title" id="cap-title"></div>
      <div class="cap-sub" id="cap-sub">グロップ 安武出勤予定</div>
    </div>
    <div style="padding:8px 6px 0">
      <div class="weekday-row">
        <div class="weekday-label sun">日</div>
        <div class="weekday-label week">月</div>
        <div class="weekday-label week">火</div>
        <div class="weekday-label week">水</div>
        <div class="weekday-label week">木</div>
        <div class="weekday-label week">金</div>
        <div class="weekday-label sat">土</div>
      </div>
      <div class="days-grid" id="days-grid"></div>
    </div>
  </div>
</div>

<!-- Memo Panel -->
<div class="memo-panel" id="memo-panel" style="display:none">
  <div class="memo-panel-header">✏️ メモ入力</div>
  <div class="memo-area">
    <div class="memo-date-label" id="memo-date-label"></div>
    <textarea class="memo-input" id="memo-input" rows="3" placeholder="連絡事項や備考を入力..."></textarea>
    <button class="memo-save-btn" id="memo-save-btn">保存する</button>
  </div>
</div>

<div class="help-bar">
  <div class="help-item"><div class="help-dot" style="background:var(--accent)"></div>1回タップ: 出勤</div>
  <div class="help-item"><div class="help-dot" style="background:var(--paid)"></div>2回タップ: 有給申請</div>
  <div class="help-item"><div class="help-dot" style="background:#e8edf3;border:1.5px solid #ccc"></div>3回: 解除</div>
  <div class="help-item">🔒 ロックで月を確定</div>
</div>

<div class="schedule-section">
  <div class="section-title" id="schedule-title">今月の出勤予定</div>
  <div class="schedule-list" id="schedule-list"></div>
</div>

<!-- LINE MODAL -->
<div class="modal-overlay" id="line-modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">💬 LINEで送る</div>

    <div class="img-preview-wrap">
      <div class="img-preview-label">📅 カレンダー画像</div>
      <div class="img-generating" id="img-generating"><div class="spinner"></div>生成中...</div>
      <img id="cal-img-preview" style="display:none" alt="カレンダー">
    </div>

    <div class="text-preview-label">📋 テキスト内容</div>
    <div class="line-preview" id="line-preview"></div>

    <div class="steps-guide">
      <strong>📌 LINEへの送り方</strong><br>
      ① 「📥 画像を保存」で写真アプリに保存<br>
      ② 「💬 LINEを開く」でテキストを送信<br>
      ③ LINEのトーク画面で画像も添付して送信
    </div>

    <div class="modal-btns">
      <button class="btn-save-img" id="btn-save-img">📥 画像を保存</button>
      <button class="btn-line" id="btn-line-open">💬 LINEを開く</button>
      <button class="btn-copy" id="btn-copy">📋 コピー</button>
      <button class="btn-cancel" id="btn-cancel">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let dayData = JSON.parse(localStorage.getItem('workCalData') || '{}');
  let lockedMonths = new Set(JSON.parse(localStorage.getItem('workCalLocked') || '[]'));
  const WEEKDAYS = ['日','月','火','水','木','金','土'];
  const MONTHS_JP = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  // 最後に表示していた月を復元
  const savedPage = JSON.parse(localStorage.getItem('workCalPage') || 'null');
  if (savedPage) { currentYear = savedPage.year; currentMonth = savedPage.month; }

  function saveData() { localStorage.setItem('workCalData', JSON.stringify(dayData)); }
  function saveLocks() { localStorage.setItem('workCalLocked', JSON.stringify([...lockedMonths])); }
  function savePage() { localStorage.setItem('workCalPage', JSON.stringify({year:currentYear, month:currentMonth})); }
  function monthKey(y,m) { return `${y}-${m}`; }
  function isLocked() { return lockedMonths.has(monthKey(currentYear, currentMonth)); }
  function getKey(y,m,d) { return `${y}-${m}-${d}`; }
  function getData(y,m,d) { return dayData[getKey(y,m,d)] || {state:0,memo:''}; }
  function setData(y,m,d,upd) {
    const k=getKey(y,m,d);
    dayData[k]={...getData(y,m,d),...upd};
    if(dayData[k].state===0&&!dayData[k].memo) delete dayData[k];
    saveData();
  }

  let memoTarget = null;

  // Lock
  document.getElementById('lock-btn').addEventListener('click', () => {
    const mk = monthKey(currentYear, currentMonth);
    if (lockedMonths.has(mk)) {
      if (!confirm(`${currentYear}年${currentMonth+1}月のロックを解除しますか？`)) return;
      lockedMonths.delete(mk);
      showToast('🔓 ロック解除しました');
    } else {
      lockedMonths.add(mk);
      showToast('🔒 この月をロックしました');
      document.getElementById('memo-panel').style.display = 'none';
    }
    saveLocks(); updateLockUI();
  });

  function updateLockUI() {
    const locked = isLocked();
    const btn = document.getElementById('lock-btn');
    document.getElementById('lock-icon').textContent = locked ? '🔒' : '🔓';
    document.getElementById('lock-label').textContent = locked ? '解除' : 'ロック';
    document.getElementById('lock-banner').classList.toggle('show', locked);
    btn.classList.toggle('locked', locked);
  }

  // Render
  function renderCalendar() {
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';
    const year = currentYear, month = currentMonth;
    const locked = isLocked();

    document.getElementById('month-title').textContent = `${year}年 ${MONTHS_JP[month]}`;
    document.getElementById('cap-title').textContent = `${year}年${month+1}月 出勤予定`;
    document.getElementById('cap-sub').textContent = 'グロップ 安武出勤予定';

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month+1, 0).getDate();
    const daysInPrev = new Date(year, month, 0).getDate();
    let wc=0, pc=0;

    for (let i=0; i<firstDay; i++) {
      const cell = document.createElement('div');
      cell.className = 'day-cell other-month';
      cell.innerHTML = `<div class="circle-mark"></div><span class="day-num">${daysInPrev-firstDay+1+i}</span>`;
      grid.appendChild(cell);
    }
    for (let d=1; d<=daysInMonth; d++) {
      const date = new Date(year,month,d);
      const dow = date.getDay();
      const isToday = date.toDateString()===today.toDateString();
      const data = getData(year,month,d);
      if(data.state===1) wc++;
      if(data.state===2) pc++;
      const cell = document.createElement('div');
      let cls = 'day-cell';
      if(dow===0) cls+=' sun'; else if(dow===6) cls+=' sat';
      if(isToday) cls+=' today';
      if(data.state===1) cls+=' work'; else if(data.state===2) cls+=' paid';
      if(locked) cls+=' locked-cell';
      cell.className = cls;
      cell.innerHTML = `
        <div class="circle-mark"></div>
        <span class="day-num">${d}</span>
        ${data.state===2?'<span class="paid-label">有給</span>':''}
        ${data.memo?'<div class="memo-dot"></div>':''}`;
      cell.addEventListener('click', () => {
        if(isLocked()){showToast('🔒 ロック中は編集できません'); return;}
        handleDayTap(year,month,d,cell);
      });
      grid.appendChild(cell);
    }
    const rem = (firstDay+daysInMonth)%7;
    if(rem!==0) for(let i=1;i<=7-rem;i++){
      const cell=document.createElement('div');
      cell.className='day-cell other-month';
      cell.innerHTML=`<div class="circle-mark"></div><span class="day-num">${i}</span>`;
      grid.appendChild(cell);
    }
    document.getElementById('work-count').textContent = wc;
    document.getElementById('paid-count').textContent = pc;
    updateLockUI();
    renderScheduleList();
  }

  function handleDayTap(year,month,day,cell) {
    const data=getData(year,month,day);
    const next=(data.state+1)%3;
    setData(year,month,day,{state:next});
    cell.classList.remove('work','paid');
    if(next===1){cell.classList.add('work');showToast('🔴 出勤日に設定しました');}
    else if(next===2){cell.classList.add('paid');showToast('🟢 有給申請しました');}
    else showToast('✕ 解除しました');
    const numEl=cell.querySelector('.day-num');
    cell.querySelector('.paid-label')?.remove();
    cell.querySelector('.memo-dot')?.remove();
    if(next===2){const l=document.createElement('span');l.className='paid-label';l.textContent='有給';cell.appendChild(l);}
    if(getData(year,month,day).memo){const dot=document.createElement('div');dot.className='memo-dot';cell.appendChild(dot);}
    numEl.style.color=(next>0)?'#fff':'';
    openMemoPanel(year,month,day);
    updateStats(); renderScheduleList();
  }

  function openMemoPanel(y,m,d) {
    if(isLocked()) return;
    memoTarget={year:y,month:m,day:d};
    document.getElementById('memo-date-label').textContent=`${y}年${m+1}月${d}日 (${WEEKDAYS[new Date(y,m,d).getDay()]})`;
    document.getElementById('memo-input').value=getData(y,m,d).memo||'';
    const panel=document.getElementById('memo-panel');
    panel.style.display='block';
    panel.scrollIntoView({behavior:'smooth',block:'nearest'});
  }

  document.getElementById('memo-save-btn').addEventListener('click',()=>{
    if(!memoTarget) return;
    setData(memoTarget.year,memoTarget.month,memoTarget.day,{memo:document.getElementById('memo-input').value.trim()});
    document.getElementById('memo-panel').style.display='none';
    renderCalendar(); showToast('📝 メモを保存しました');
  });

  function updateStats(){
    let wc=0,pc=0;
    const days=new Date(currentYear,currentMonth+1,0).getDate();
    for(let d=1;d<=days;d++){const s=getData(currentYear,currentMonth,d).state;if(s===1)wc++;if(s===2)pc++;}
    document.getElementById('work-count').textContent=wc;
    document.getElementById('paid-count').textContent=pc;
  }

  function renderScheduleList(){
    const list=document.getElementById('schedule-list');
    document.getElementById('schedule-title').textContent=`${currentYear}年${currentMonth+1}月の出勤・有給一覧`;
    list.innerHTML='';
    const days=new Date(currentYear,currentMonth+1,0).getDate();
    const items=[];
    for(let d=1;d<=days;d++){const data=getData(currentYear,currentMonth,d);if(data.state>0)items.push({d,state:data.state,memo:data.memo});}
    if(items.length===0){list.innerHTML='<div class="empty-schedule">まだ予定が登録されていません</div>';return;}
    for(const item of items){
      const dow=new Date(currentYear,currentMonth,item.d).getDay();
      const el=document.createElement('div'); el.className='schedule-item';
      el.innerHTML=`
        <div class="schedule-dot ${item.state===2?'paid':'work'}"></div>
        <div class="schedule-date">${currentMonth+1}/${item.d}(${WEEKDAYS[dow]})</div>
        <div class="schedule-type">${item.state===2?'有給申請':'出勤'}</div>
        ${item.memo?`<div class="schedule-memo">📝 ${item.memo}</div>`:''}`;
      list.appendChild(el);
    }
  }

  // ===== LINE SHARE =====
  function buildLineText(){
    const year=currentYear,month=currentMonth;
    const days=new Date(year,month+1,0).getDate();
    let workDays=[],paidDays=[],memos=[];
    for(let d=1;d<=days;d++){
      const data=getData(year,month,d);
      const dow=WEEKDAYS[new Date(year,month,d).getDay()];
      if(data.state===1) workDays.push(`${month+1}/${d}(${dow})`);
      if(data.state===2) paidDays.push(`${month+1}/${d}(${dow})`);
      if(data.memo) memos.push(`${month+1}/${d}: ${data.memo}`);
    }
    let t=`【出勤予定】${year}年${month+1}月\n出勤: ${workDays.length}日 / 有給: ${paidDays.length}日\n${'─'.repeat(20)}\n`;
    if(workDays.length>0) t+=`🔴 出勤日\n${workDays.join('、')}\n`;
    if(paidDays.length>0) t+=`🟢 有給申請\n${paidDays.join('、')}\n`;
    if(memos.length>0){t+=`${'─'.repeat(20)}\n📝 備考\n`;memos.forEach(m=>t+=`${m}\n`);}
    if(isLocked()) t+=`${'─'.repeat(20)}\n🔒 確定済み`;
    return t;
  }

  // Generate calendar image using html2canvas
  async function generateCalImage() {
    document.getElementById('img-generating').style.display='flex';
    document.getElementById('cal-img-preview').style.display='none';
    try {
      const target = document.getElementById('cal-capture');
      const canvas = await html2canvas(target, {
        scale: 2, useCORS: true, backgroundColor: '#f0f4f8',
        logging: false
      });
      const dataUrl = canvas.toDataURL('image/png');
      const img = document.getElementById('cal-img-preview');
      img.src = dataUrl;
      img.style.display = 'block';
      document.getElementById('img-generating').style.display='none';
      return dataUrl;
    } catch(e) {
      document.getElementById('img-generating').style.display='none';
      document.getElementById('img-generating').textContent='画像生成に失敗しました';
      return null;
    }
  }

  let cachedImgUrl = null;

  document.getElementById('line-share-btn').addEventListener('click', async () => {
    document.getElementById('line-preview').textContent = buildLineText();
    document.getElementById('line-modal').classList.add('show');
    cachedImgUrl = await generateCalImage();
  });

  // Save image to device
  document.getElementById('btn-save-img').addEventListener('click', () => {
    if(!cachedImgUrl){showToast('⚠️ 画像がまだ生成されていません'); return;}
    const a=document.createElement('a');
    a.href=cachedImgUrl;
    a.download=`出勤予定_${currentYear}年${currentMonth+1}月.png`;
    a.click();
    showToast('📥 画像を保存しました。LINEで添付してください');
  });

  // Open LINE with text
  document.getElementById('btn-line-open').addEventListener('click', () => {
    const encoded=encodeURIComponent(buildLineText());
    window.open(`https://line.me/R/share?text=${encoded}`,'_blank');
  });

  // Copy text
  document.getElementById('btn-copy').addEventListener('click', () => {
    const text=buildLineText();
    if(navigator.clipboard){
      navigator.clipboard.writeText(text).then(()=>showToast('📋 テキストをコピーしました'));
    } else {
      const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      showToast('📋 コピーしました');
    }
    document.getElementById('line-modal').classList.remove('show');
  });

  document.getElementById('btn-cancel').addEventListener('click',()=>document.getElementById('line-modal').classList.remove('show'));
  document.getElementById('line-modal').addEventListener('click',e=>{if(e.target===document.getElementById('line-modal'))document.getElementById('line-modal').classList.remove('show');});

  // Nav
  document.getElementById('prev-btn').addEventListener('click',()=>{
    currentMonth--;if(currentMonth<0){currentMonth=11;currentYear--;}
    document.getElementById('memo-panel').style.display='none'; savePage(); renderCalendar();
  });
  document.getElementById('next-btn').addEventListener('click',()=>{
    currentMonth++;if(currentMonth>11){currentMonth=0;currentYear++;}
    document.getElementById('memo-panel').style.display='none'; savePage(); renderCalendar();
  });

  // Toast
  let toastTimer;
  function showToast(msg){
    const t=document.getElementById('toast');
    t.textContent=msg; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
  }

  renderCalendar();
</script>
</body>
</html>
